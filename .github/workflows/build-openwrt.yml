name: Build OpenWrt

on:
  workflow_dispatch:
    inputs:
      device:
        description: Target device to build
        required: true
        default: mt2500
        type: choice
        options:
          - mt2500
          - mt6000
          - easepi
      repo_branch:
        description: ImmortalWrt branch to compile
        required: true
        default: openwrt-25.12
        type: string
      upload_release:
        description: Publish firmware to GitHub Release
        required: true
        default: false
        type: boolean

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  TZ: Asia/Shanghai
  BUILD_DIR: openwrt
  DEVICE: ${{ inputs.device }}
  REPO_BRANCH: ${{ inputs.repo_branch }}
  UPLOAD_RELEASE: ${{ inputs.upload_release }}

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    permissions:
      contents: write
      actions: write

    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo bash -c 'bash <(curl -fsSL https://build-scripts.immortalwrt.org/init_build_environment.sh)'
          sudo timedatectl set-timezone "$TZ"
          sudo chown -R "$USER:$USER" "$GITHUB_WORKSPACE"

      - name: Clone ImmortalWrt source
        run: |
          git clone --depth=1 -b "$REPO_BRANCH" "$REPO_URL" "$BUILD_DIR"

      - name: Apply source patches
        run: |
          for script in scripts/ci/patches/*.sh; do
            [ -f "$script" ] || continue
            bash "$script"
          done

      - name: Resolve device config
        id: config
        run: |
          set -euo pipefail
          case "$DEVICE" in
            mt2500) resolved="configs/mt2500.config" ;;
            mt6000) resolved="configs/mt6000.config" ;;
            easepi) resolved="configs/easepi.config" ;;
            *)
              echo "Unknown device: $DEVICE"
              exit 1
              ;;
          esac
          if [ ! -f "$resolved" ]; then
            echo "Config not found: $resolved"
            exit 1
          fi
          echo "path=$resolved" >> "$GITHUB_OUTPUT"

      - name: Prepare cache directories
        run: |
          mkdir -p "${{ env.BUILD_DIR }}/dl"
          mkdir -p ~/.ccache

      - name: Cache downloads and ccache
        id: cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.BUILD_DIR }}/dl
            ~/.ccache
          key: ${{ runner.os }}-${{ env.DEVICE }}-${{ hashFiles(format('configs/{0}.config', env.DEVICE)) }}
          restore-keys: |
            ${{ runner.os }}-${{ env.DEVICE }}-
            ${{ runner.os }}-

      - name: Cache status
        run: |
          if [ "${{ steps.cache.outputs.cache-hit }}" = "true" ]; then
            echo "Cache restored for ${{ env.DEVICE }} (dl + ccache)."
          else
            echo "No cache yet for ${{ env.DEVICE }} — expected on first successful build."
            echo "This is not an error; sources will be downloaded fresh."
          fi

      - name: Update and install feeds
        run: |
          set -euo pipefail
          cd "$BUILD_DIR"
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Apply device config
        env:
          CONFIG_PATH: ${{ steps.config.outputs.path }}
        run: |
          set -euo pipefail
          cp "$CONFIG_PATH" "$BUILD_DIR/.config"

          if [ -f scripts/ci/post-config.sh ]; then
            bash scripts/ci/post-config.sh
          fi

          device_script="scripts/ci/devices/${DEVICE}.sh"
          if [ -f "$device_script" ]; then
            bash "$device_script"
          fi

          cd "$BUILD_DIR"
          make defconfig

          device="$(grep -E '^CONFIG_TARGET_.*DEVICE_.*=y' .config | head -n1 | sed -E 's/.*DEVICE_(.*)=y/\1/')"
          if [ -z "$device" ]; then
            echo "No target device selected in config"
            exit 1
          fi

          echo "DEVICE_NAME=$device" >> "$GITHUB_ENV"
          echo "FILE_DATE=$(date +%Y%m%d%H%M)" >> "$GITHUB_ENV"

      - name: Download sources
        run: |
          cd "$BUILD_DIR"
          make download -j"$(nproc)"
          find dl -size -1024c -exec rm -f {} \;

      - name: Compile firmware
        id: compile
        run: |
          set -euo pipefail
          cd "$BUILD_DIR"
          make -j"$(nproc)" || make -j1 V=s
          echo "status=success" >> "$GITHUB_OUTPUT"

      - name: Collect firmware artifacts
        id: artifacts
        if: steps.compile.outputs.status == 'success'
        run: |
          set -euo pipefail
          target_dir="$(find "$BUILD_DIR/bin/targets" -mindepth 2 -maxdepth 2 -type d | head -n1)"
          if [ -z "$target_dir" ]; then
            echo "No firmware output directory found"
            exit 1
          fi

          staging="$RUNNER_TEMP/firmware"
          mkdir -p "$staging"

          find "$target_dir" -maxdepth 1 -type f \
            \( -name '*squashfs-sysupgrade.bin*' \
            -o -name '*initramfs-kernel.bin*' \
            -o -name '*.manifest' \
            -o -name 'sha256sums' \
            -o -name 'profiles.json' \) \
            -exec cp -t "$staging" {} +

          if [ -z "$(ls -A "$staging")" ]; then
            echo "No firmware files matched device: $DEVICE_NAME"
            find "$target_dir" -maxdepth 1 -type f -exec ls -lh {} \;
            exit 1
          fi

          echo "dir=$staging" >> "$GITHUB_OUTPUT"
          ls -lh "$staging"

      - name: Upload firmware artifact
        if: steps.artifacts.outputs.dir != ''
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-${{ env.DEVICE_NAME }}-${{ env.FILE_DATE }}
          path: ${{ steps.artifacts.outputs.dir }}
          if-no-files-found: error

      - name: Publish GitHub Release
        if: env.UPLOAD_RELEASE == 'true' && steps.artifacts.outputs.dir != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.DEVICE_NAME }}-${{ env.FILE_DATE }}
          name: ImmortalWrt ${{ env.DEVICE_NAME }} (${{ env.FILE_DATE }})
          files: ${{ steps.artifacts.outputs.dir }}/*
          generate_release_notes: true

      - name: Build summary
        if: always()
        run: |
          {
            echo "### Build parameters"
            echo "- Device preset: \`${{ inputs.device }}\`"
            echo "- Config: \`${{ steps.config.outputs.path }}\`"
            echo "- ImmortalWrt branch: \`${{ inputs.repo_branch }}\`"
            echo "- Target profile: \`${{ env.DEVICE_NAME }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
